<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
    <script type="module" src="popup.js"></script>
</head>
<body>
    <div class="popup">
        <header class="top">
            <img src="../../assets/images/shield-icon.png" alt="wBlock" class="app-icon">
            <div class="top-text">
                <div class="title-row">
                    <div class="title-group">
                        <div class="title">wBlock</div>
                        <button id="open-app" class="top-open" type="button" hidden data-i18n="popup_button_open_short">Open</button>
                    </div>
                    <div id="blocking-status" class="pill" data-i18n="popup_status_loading">Loading…</div>
                </div>
                <div class="subtitle" id="site-host">—</div>
            </div>
        </header>

        <div class="section">
            <label class="toggle-row" for="disable-toggle">
                <span class="label" data-i18n="popup_disable_on_site">Disable on this site</span>
                <span class="switch">
                    <input id="disable-toggle" type="checkbox" />
                    <span class="slider" aria-hidden="true"></span>
                </span>
            </label>
            <div id="userscripts-section" hidden>
                <button id="userscripts-toggle" class="disclosure" type="button" aria-expanded="false">
                    <span data-i18n="popup_userscripts">Userscripts</span>
                    <span class="disclosure-meta">
                        <span id="userscripts-count" class="value">0</span>
                        <span id="userscripts-chevron" class="chevron" aria-hidden="true">▾</span>
                    </span>
                </button>
                <div id="userscripts-list" class="userscript-list" hidden></div>
                <div id="userscripts-empty" class="hint" hidden data-i18n="popup_userscripts_empty">No userscripts are running on this page.</div>
            </div>
        </div>

        <div class="section">
            <div class="row">
                <div id="zapper-title" class="label" data-i18n="popup_element_zapper">Element zapper</div>
                <div class="row-trailing">
                    <div id="zapper-count" class="value">0</div>
                    <label class="switch" for="zapper-enabled-toggle">
                        <input id="zapper-enabled-toggle" type="checkbox" checked aria-labelledby="zapper-title" />
                        <span class="slider" aria-hidden="true"></span>
                    </label>
                </div>
            </div>
            <div class="button-row">
                <button id="zapper-activate" class="btn btn-primary" type="button" data-i18n="popup_button_activate">Activate</button>
                <button id="zapper-clear" class="btn btn-secondary" type="button" disabled data-i18n="popup_button_clear">Clear</button>
            </div>
            <div class="hint" data-i18n="popup_hint_tap_to_hide">Tap an element on the page to hide it. Use "Add Rule" in the zapper for manual selectors.</div>

            <button id="zapper-rules-toggle" class="disclosure" type="button" aria-expanded="false">
                <span data-i18n="popup_rules">Rules</span>
                <span id="zapper-rules-chevron" class="chevron" aria-hidden="true">▾</span>
            </button>
            <div id="zapper-rules" class="rules" hidden></div>
        </div>

        <div id="userscript-commands" class="section" hidden></div>

        <footer class="footer">
            <div id="error" class="error" hidden></div>
        </footer>
    </div>
</body>
</html>
