<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Synthetic unknown player with positioned chrome (Player Cleaner generic test)</title>
<style>
  body { margin: 0; background: #111; }
  /* Completely unknown class names — Player Cleaner has never seen these.
     The container uses position:relative (a positioning context), which is
     the heuristic that tells the generic chrome hider this is a player shell. */
  .xq7-player-shell {
    position: relative; width: 960px; max-width: 100%;
    aspect-ratio: 16 / 9; margin: 24px auto; background: #000;
  }
  .xq7-player-shell video { width: 100%; height: 100%; background: #222; }
  .xq7-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,.15);
    display: flex; align-items: center; justify-content: center;
  }
  .xq7-controls-wrap {
    position: absolute; left: 0; right: 0; bottom: 0;
  }
  .xq7-controls-bar {
    height: 48px; background: rgba(0,0,0,.75);
    display: flex; align-items: center; padding: 0 12px; gap: 8px;
    color: #fff; font: 13px/1 sans-serif;
  }
</style>
</head>
<body>
  <!-- A player whose wrapper class is NOT in Player Cleaner's known-library
       list.  The container has position:relative, so the generic chrome hider
       treats it as a player shell and aggressively hides all non-video chrome. -->
  <div class="xq7-player-shell xq7-player-shell--active">
    <video></video>
    <div class="xq7-overlay">
      <span class="xq7-play-btn">▶</span>
    </div>
    <div class="xq7-controls-wrap">
      <div class="xq7-controls-bar">
        <span class="xq7-play-btn">⏸</span>
        <span class="xq7-time">0:00</span>
        <div class="xq7-progress"></div>
        <span class="xq7-mute-btn">🔊</span>
        <span class="xq7-cc-btn">CC</span>
        <span class="xq7-fs-btn">⛶</span>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var v = document.querySelector('.xq7-player-shell video');
      // Opaque MSE-style source so Player Cleaner enhances in place.
      try { v.src = 'blob:https://example.com/00000000-0000-0000-0000-000000000000'; } catch (e) {}

      // Adversarial: the custom player keeps trying to hide native controls.
      function fightControls() {
        try { v.controls = false; } catch (e) {}
        try { v.removeAttribute('controls'); } catch (e) {}
      }
      setTimeout(fightControls, 800);
      setTimeout(fightControls, 2500);
      setInterval(fightControls, 3000);
    })();
  </script>
</body>
</html>
