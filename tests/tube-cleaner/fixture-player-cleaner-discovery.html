<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Source discovery variants (Player Cleaner test)</title>
<style>
  body { margin: 0; background: #111; }
  .player { position: relative; width: 320px; aspect-ratio: 16 / 9; margin: 12px auto; background: #000; }
  .player video { width: 100%; height: 100%; background: #222; }
</style>
</head>
<body>
  <!-- A: source on the video element itself (sourceFromVideoElement -> src) -->
  <div class="video-js player" id="p-src">
    <video src="https://example.com/a.mp4"></video>
  </div>

  <!-- B: source in a <source> child (sourceFromVideoElement -> source child) -->
  <div class="plyr player" id="p-source-child">
    <video><source src="https://example.com/b.mp4" type="video/mp4"></video>
  </div>

  <!-- C: source in a descendant data attribute (sourceFromDom) -->
  <div class="jwplayer player" id="p-dom">
    <video></video>
    <div data-src="https://example.com/c.mp4"></div>
  </div>

  <!-- D: source via a mocked video.js player (sourceFromVideojs) -->
  <div class="flowplayer player" id="p-videojs">
    <video></video>
  </div>

  <!-- E: source via a mocked JW Player instance (sourceFromJwPlayer) -->
  <div class="jwplayer player" id="p-jwplayer">
    <video></video>
  </div>

  <!-- Negative F: generic data-src is a poster, not media. Keep blob/MSE. -->
  <div class="jwplayer player" id="p-poster">
    <video></video>
    <img data-src="https://example.com/poster.jpg" alt="">
  </div>

  <!-- Negative G: Safari cannot natively play DASH .mpd. Keep blob/MSE. -->
  <div class="flowplayer player" id="p-dash">
    <video></video>
  </div>

  <script>
    (function () {
      // Give the opaque-source players a blob src so sourceFromVideoElement
      // returns null and the intended discovery path is exercised.
      ['p-dom', 'p-videojs', 'p-jwplayer', 'p-poster', 'p-dash'].forEach(function (id) {
        var v = document.getElementById(id).querySelector('video');
        try { v.src = 'blob:https://example.com/00000000-0000-0000-0000-000000000000'; } catch (e) {}
      });

      // Mock video.js: one player whose element lives inside #p-videojs, so the
      // containment check in sourceFromVideojs only matches that container.
      window.videojs = {
        getPlayers: function () {
          return {
            mock: {
              el: function () { return document.querySelector('#p-videojs video'); },
              currentSource: function () { return { src: 'https://example.com/d.mp4', type: 'video/mp4' }; }
            },
            dash: {
              el: function () { return document.querySelector('#p-dash video'); },
              currentSource: function () { return { src: 'https://example.com/live/manifest.mpd', type: 'application/dash+xml' }; }
            }
          };
        }
      };

      // Mock JW Player: only the #p-jwplayer container gets a playlist item, so
      // sourceFromJwPlayer does not leak a source into the other containers.
      window.jwplayer = function (idOrEl) {
        var id = typeof idOrEl === 'string' ? idOrEl : (idOrEl && idOrEl.id);
        if (id !== 'p-jwplayer') return null;
        return { getPlaylistItem: function () { return {
          file: 'https://example.com/e.mp4',
          tracks: [
            { file: 'https://example.com/e-en.vtt', kind: 'captions', label: 'English', language: 'en' },
            { file: 'https://example.com/e-chapters.vtt', kind: 'chapters', label: 'Chapters' }
          ]
        }; } };
      };
    })();
  </script>
</body>
</html>
